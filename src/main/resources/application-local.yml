spring:
  config:
    activate:
      on-profile: local

  # Local-only bootstrap note: docker-compose sets KAFKA_AUTO_CREATE_TOPICS_ENABLE=false.
  # We must add a KafkaTopicConfig bean to create all 6 required topics on startup.

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
